<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <radialGradient id="bg" cx="55%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a2460"/>
      <stop offset="100%" stop-color="#0d0b1e"/>
    </radialGradient>
    <linearGradient id="body" x1="20%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#b0aaf5"/>
      <stop offset="45%" stop-color="#7F77DD"/>
      <stop offset="100%" stop-color="#4a44a8"/>
    </linearGradient>
    <linearGradient id="mane" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#5a54c0"/>
      <stop offset="100%" stop-color="#322e80"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Mane / back of neck (darker layer behind) -->
  <path fill="url(#mane)" opacity="0.7" d="
    M 22 90
    C 18 76 20 62 24 52
    C 22 46 20 40 22 34
    C 18 42 16 54 16 66
    C 16 78 18 86 22 90 Z
  "/>

  <!-- Main head silhouette -->
  <path fill="url(#body)" filter="url(#glow)" d="
    M 22 90
    C 18 76 20 62 24 52
    C 24 44 26 36 30 28
    C 32 24 36 18 40 14
    C 42 10 42 7 40 5
    L 36 1
    L 38 8
    C 40 10 44 12 48 14
    C 54 16 60 20 66 26
    C 70 30 74 36 74 44
    C 74 50 72 54 68 58
    C 64 62 58 64 54 64
    C 50 64 46 66 44 68
    C 42 70 40 73 38 78
    C 36 83 40 90 50 90
    L 22 90 Z
  "/>

  <!-- Ear inner highlight -->
  <path fill="#d0ccff" opacity="0.45" d="M 40 5 L 36 1 L 38 8 L 40 9 Z"/>

  <!-- Eye -->
  <ellipse cx="62" cy="30" rx="5" ry="4.5" fill="#08071a"/>
  <circle cx="63.5" cy="28.5" r="2" fill="white" opacity="0.65"/>
  <circle cx="62.5" cy="30.5" r="0.8" fill="white" opacity="0.25"/>

  <!-- Nostril -->
  <ellipse cx="70" cy="51" rx="3.2" ry="2" transform="rotate(-18 70 51)" fill="#2e2878" opacity="0.6"/>

  <!-- Face highlight (bright specular on bridge) -->
  <path fill="white" opacity="0.09" d="
    M 48 14 C 54 16 60 20 66 26 C 68 28 70 31 72 35
    C 68 28 62 22 54 17 C 50 15 48 14 48 14 Z
  "/>

  <!-- Subtle forehead gloss -->
  <ellipse cx="44" cy="20" rx="6" ry="4" fill="white" opacity="0.06" transform="rotate(-20 44 20)"/>
</svg>
