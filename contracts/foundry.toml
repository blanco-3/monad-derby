[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
monad_testnet = "${MONAD_RPC_URL}"
localhost = "http://127.0.0.1:8545"
